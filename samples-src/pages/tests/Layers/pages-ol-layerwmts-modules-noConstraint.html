{{#extend "ol-sample-modules-layout"}}

{{#content "vendor"}}
        <script src="{{ baseurl }}/dist/modules/GpfExtOlLayers.js"></script>
{{/content}}

{{#content "head"}}
        <title>Sample openlayers</title>
{{/content}}

{{#content "style"}}
        <style>
            div#map {
                width: 100%;
                height: 500px;
            }
        </style>
{{/content}}

{{#content "body"}}
            <h2>Ajout d'une couche WMTS</h2>
            <!-- map -->
            <div id="map">
            </div>
            <div>
                <input id="scale" type="text">
            </div>
{{/content}}

{{#content "js"}}
            <script type="text/javascript">
                var map;
                var view;
                var createMap = function() {
                    // on cache l'image de chargement du Géoportail.
                    document.getElementById('map').style.backgroundImage = 'none';

                    var input = document.getElementById("scale");
                    view = new ol.View({
                            center : [288074.8449901076, 6247982.515792289],
                            zoom : 6,
                            minZoom: 0,
                            maxZoom: 24
                    });
                    map = new ol.Map({
                        target : "map",
                        view : view,
                        layers : [
                            new ol.layer.GeoportalWMTS({
                                layer : "ORTHOIMAGERY.ORTHOPHOTOS",
                                // no constraints on zoom levels
                                noConstraint: true
                            })
                        ]
                    });
                    view.on('change:resolution', function() {
                        var scale = view.getResolution();
                        var zoom = view.getZoom();
                        var message = "Scale : " + Number.parseFloat(scale).toFixed(2) + " @ Zoom : " + Number.parseFloat(zoom).toFixed(2)
                        console.log(message);
                        input.value = message;
                    });


                };
                Gp.Services.getConfig({
                    customConfigFile : "{{ configurl }}",
                    callbackSuffix : "",
                    // apiKey: "{{ apikey }}",
                    timeOut : 20000,
                    onSuccess : createMap,
                    onFailure : (e) => {
                        console.error(e);
                    }
                });
           </script>
{{/content}}

{{/extend}}
