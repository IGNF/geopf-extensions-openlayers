{{#content "body"}}
<h2>Outil de dessin avec dialogue de style</h2>
<!-- map -->
<div id="map">
</div>
{{/content}}

{{#content "js"}}
<script type="text/javascript">
    var map;
    window.onload = function () {
        // on cache l'image de chargement du Géoportail.
        document.getElementById('map').style.backgroundImage = 'none';

        let source = new ol.source.Vector({})
        // let layer = new ol.layer.Vector({
        //     source: source
        // })

        // 1. Création de la map
        map = new ol.Map({
            target: "map",
            view: new ol.View({
                center: [288074.8449901076, 6247982.515792289],
                zoom: 6
            }),
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM(),
                    opacity: 0.5
                }),
                // layer
            ]
        });

        const saveDrawing = function (e) {
            alert("Enregistrement dans l'espace perso");
        }

        const exportDrawing = function (e) {
            // Récupère le nom
            const input = this.getFooterContent().firstChild?.querySelector("input");
            const name = input.value || "export_dessin";

            // Récupère la source
            const source = draw.getSource();
            const featProj = draw.getSource().getProjection() || draw.getMap().getView().getProjection();
            if (!featProj) {
                alert("pas de projection");
                return;
            }

            // Transforme en KML
            const format = new ol.format.KML({});
            const result = format.writeFeatures(source.getFeatures(), {
                dataProjection: "EPSG:4326",
                featureProjection: featProj
            });

            // Exporte le fichier
            const link = document.createElement("a");
            const charset = "utf-8";
            link.href = "data:application/vnd.google-earth.kml+xml;charset=" + charset + "," + encodeURIComponent(result);
            link.download = `${name}.kml`;
            link.click();
        }

        const draw = new ol.control.Draw({
            // position: "right",
            style: true,
            addToMap: true,
            footer: {
                content: `<div class="fr-input-group">
                            <label class="GPlabel gpf-label fr-label" for="fileName">Nom du fichier</label>
                            <input type="text" id="fileName" class="GPinput gpf-input fr-input">
                        </div>`,
                buttons: [
                    {
                        label: "Exporter",
                        title: "Fermer le dialogue",
                        className: "fr-btn--tertiary",
                        callback: exportDrawing,
                    },
                    {
                        label: "Enregistrer",
                        title: "Enregistrer le calque",
                        callback: saveDrawing,
                    },
                ]
            }
        });

        map.addControl(draw);

        window.select = draw.getSelect();
    };
</script>
{{/content}}
