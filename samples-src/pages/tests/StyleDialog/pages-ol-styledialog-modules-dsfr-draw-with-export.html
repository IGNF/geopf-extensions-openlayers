{{#content "style"}}
<style>
    div#map {
        width: 100%;
        height: 500px;
    }
</style>

{{#content "body"}}
<h2>Outil de dessin avec export</h2>
<!-- map -->
<div id="map">
</div>
{{/content}}

{{#content "js"}}
<script type="text/javascript">
    var map;
    window.onload = function () {
        // on cache l'image de chargement du Géoportail.
        document.getElementById('map').style.backgroundImage = 'none';

        let source = new ol.source.Vector({})
        // let layer = new ol.layer.Vector({
        //     source: source
        // })

        // 1. Création de la map
        map = new ol.Map({
            target: "map",
            view: new ol.View({
                center: [288074.8449901076, 6247982.515792289],
                zoom: 6
            }),
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM(),
                    opacity: 0.5
                }),
                // layer
            ]
        });

        const draw = new ol.control.Draw({
            // position: "right",
            style: true,
            addToMap: true,
        });

        map.addControl(draw);

        const btnExport = new ol.control.Export({
            title: "Exporter",
            kind: "secondary",
            download: true,
            name: "Mon croquis",
            description: "",
            control: draw,
            menu: true,
            menuOptions: {
                outside: true,
                above: true,
                selectFormat: false,
                labelDesc: false
            },
            direction: "column",
            format: "KML",
            target: draw.getDialog().getFooterContent(),
            icons: {
                menu: "",
                button: "export"
            }
        });
        map.addControl(btnExport);
        btnExport.on("button:clicked", (e) => {
            console.log("Export drawing", e);
        });

        const btnSave = new ol.control.Export({
            title: "Enregistrer",
            kind: "primary",
            download: false,
            name: "Mon croquis",
            target: draw.getDialog().getFooterContent(),
            description: "",
            control: draw,
            menu: false,
            format: "KML",
            icons: {
                menu: "",
                button: "save"
            }
        });

        map.addControl(btnSave);
        btnSave.on("button:clicked", (e) => {
            console.log("Save drawing", e);
        });

        window.select = draw.getSelect();
    };
</script>
{{/content}}
