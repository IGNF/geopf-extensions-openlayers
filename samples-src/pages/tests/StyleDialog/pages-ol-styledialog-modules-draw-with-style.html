        <link rel="stylesheet" href="{{ baseurl }}/dist/modules/GpfExtOlDrawingInteraction.css" />
        <link rel="stylesheet" href="{{ baseurl }}/dist/modules/GpfExtOlSimpleMenu.css" />

        <link rel="stylesheet" href="{{ baseurl }}/dist/modules/GpfExtOlInputNumber.css" />
        <link rel="stylesheet" href="{{ baseurl }}/dist/modules/GpfExtOlCustomSelect.css" />
        <link rel="stylesheet" href="{{ baseurl }}/dist/modules/GpfExtOlCustomSelectGrid.css" />
        <link rel="stylesheet" href="{{ baseurl }}/dist/modules/GpfExtOlDefaultInput.css" />
        <link rel="stylesheet" href="{{ baseurl }}/dist/modules/GpfExtOlFlatStyleForm.css" /> 

        <script src="{{ baseurl }}/dist/modules/GpfExtOlDrawingInteraction.js"></script>
        <script src="{{ baseurl }}/dist/modules/GpfExtOlSelectingInteraction.js"></script>
        <script src="{{ baseurl }}/dist/modules/GpfExtOlModifyingInteraction.js"></script>

        <script src="{{ baseurl }}/dist/modules/GpfExtOlDraw.js"></script>
        <script src="{{ baseurl }}/dist/modules/GpfExtOlDialog.js"></script>
        <script src="{{ baseurl }}/dist/modules/GpfExtOlTabNav.js"></script>
        
        <!-- StyleDialog Controls -->
        <script src="{{ baseurl }}/dist/modules/GpfExtOlStyleForm.js"></script>
        <script src="{{ baseurl }}/dist/modules/GpfExtOlLabelForm.js"></script>
{{/content}}

{{#content "head"}}
        <title>Sample openlayers StyleDialog</title>
{{/content}}

{{#content "style"}}
        <style>
            div#map {
                width: 100%;
                height: 500px;
            }
        </style>
{{/content}}

{{#content "body"}}
            <h2>Outil de dessin avec dialogue de style</h2>
            <!-- map -->
            <div id="map">
            </div>
            <div>
                <button class="fr-btn fr-btn--secondary" id="toggleActive">Active / désactive input forme</button>
            </div>
            <div>
                <button class="fr-btn fr-btn--secondary" id="changeSource">Change la source</button>
            </div>
{{/content}}

{{#content "js"}}
            <script type="text/javascript">
                var map;
                window.onload = function() {
                    // on cache l'image de chargement du Géoportail.
                    document.getElementById('map').style.backgroundImage = 'none';

                    let source = new ol.source.Vector({})
                    let layer = new ol.layer.Vector({
                        source: source
                    })
					// 1. Création de la map
                    map = new ol.Map({
                        target : "map",
                        view : new ol.View({
                            center : [288074.8449901076, 6247982.515792289],
                            zoom : 6
                        }),
                        layers : [
                            new ol.layer.Tile({
                                source: new ol.source.OSM(),
                                // zIndex : 4,
                                opacity: 0.5
                            }),
                            layer
                        ]
                    });

                    const draw = new ol.control.Draw({
                        // position: "right",
                        icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M15.7279 9.57627L14.3137 8.16206L5 17.4758V18.89H6.41421L15.7279 9.57627ZM17.1421 8.16206L18.5563 6.74785L17.1421 5.33363L15.7279 6.74785L17.1421 8.16206ZM7.24264 20.89H3V16.6473L16.435 3.21231C16.8256 2.82179 17.4587 2.82179 17.8492 3.21231L20.6777 6.04074C21.0682 6.43126 21.0682 7.06443 20.6777 7.45495L7.24264 20.89Z"></path></svg>`,
                        title: "Dessiner",
                        style: true,
                        source : source,
                    });

                    map.addControl(draw);
                };
           </script>
{{/content}}

{{/extend}}
